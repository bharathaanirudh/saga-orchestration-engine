spring:
  application:
    name: saga-orchestrator-example

saga:
  mongodb:
    uri: mongodb://root:root@localhost:27117/saga?authSource=admin&replicaSet=rs0
    database: saga
  kafka:
    bootstrap-servers: localhost:9192
    consumer:
      group-id: saga-orchestrator
    listener:
      concurrency: 1
  timeout:
    poll-interval-ms: 60000
  outbox:
    poll-interval-ms: 30000

  # Participant validation — SDK fetches definitions from orchestrator at startup
  orchestrator:
    url: http://localhost:8080
  participant:
    strict-validation: true    # fail fast if module/action mismatch

server:
  port: 8080

logging:
  level:
    com.anirudh.saga: DEBUG
