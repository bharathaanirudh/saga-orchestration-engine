version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: saga-mongodb
    ports:
      - "27117:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - saga-mongo-data:/data/db
      - ./docker/mongodb/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    command: --replSet rs0 --bind_ip_all --keyFile /dev/null
    entrypoint:
      - bash
      - -c
      - |
        # Start mongod in background with replSet
        mongod --replSet rs0 --bind_ip_all --port 27017 &
        MONGOD_PID=$$!

        # Wait for mongod to be ready
        until mongosh --quiet --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
          sleep 1
        done

        # Initiate single-node ReplicaSet
        mongosh --quiet --eval '
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "saga-mongodb:27017" }]
          })
        ' || true

        # Wait for RS to be PRIMARY
        until mongosh --quiet --eval "rs.status().myState" 2>/dev/null | grep -q 1; do
          sleep 1
        done

        # Create root user
        mongosh --quiet --eval '
          db.getSiblingDB("admin").createUser({
            user: "root",
            pwd: "root",
            roles: ["root"]
          })
        ' || true

        echo "MongoDB ReplicaSet rs0 ready (single-node)"
        wait $$MONGOD_PID
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "rs.status().ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - saga-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: saga-zookeeper
    ports:
      - "2281:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - saga-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: saga-kafka
    depends_on:
      - zookeeper
    ports:
      - "9192:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9192
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - saga-network

  debezium:
    image: debezium/connect:2.4
    container_name: saga-debezium
    depends_on:
      kafka:
        condition: service_started
      mongodb:
        condition: service_healthy
    ports:
      - "8183:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9093
      GROUP_ID: debezium-saga
      CONFIG_STORAGE_TOPIC: debezium-configs
      OFFSET_STORAGE_TOPIC: debezium-offsets
      STATUS_STORAGE_TOPIC: debezium-status
    networks:
      - saga-network

volumes:
  saga-mongo-data:

networks:
  saga-network:
    driver: bridge
